name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install release dependencies
        run: |
          set -euo pipefail
          dnf -y install \
            curl \
            gcc \
            git \
            glib2-devel \
            gtk3-devel \
            pkgconf-pkg-config \
            tar \
            webkit2gtk4.1-devel
          dnf clean all

      - name: Install Go 1.26.3
        run: |
          set -euo pipefail
          curl -fsSL https://go.dev/dl/go1.26.3.linux-amd64.tar.gz -o /tmp/go.tar.gz
          rm -rf /usr/local/go
          tar -C /usr/local -xzf /tmp/go.tar.gz
          rm -f /tmp/go.tar.gz
          echo "/usr/local/go/bin" >> "${GITHUB_PATH}"
          /usr/local/go/bin/go version

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail

          latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -n "${latest_tag}" ]]; then
            echo "LATEST_TAG=${latest_tag}" >> "${GITHUB_ENV}"
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${latest_tag}" ]]; then
            version="${latest_tag}"
          else
            version="manual"
          fi

          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Vendor Go modules
        run: go mod vendor

      - name: Run tests
        run: go test ./...

      - name: Validate download index
        run: scripts/download-index validate

      - name: Build release package
        env:
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          APP_NAME="caracal-software-installer"
          STAGING_DIR="dist/${APP_NAME}-${VERSION}-linux-amd64"
          ARCHIVE_PATH="dist/${APP_NAME}-${VERSION}-linux-amd64.tar.gz"

          rm -rf dist
          install -d \
            "${STAGING_DIR}/usr/bin" \
            "${STAGING_DIR}/usr/lib/caracal-software-installer/bin" \
            "${STAGING_DIR}/usr/share/caracal-software-installer" \
            "${STAGING_DIR}/usr/share/applications" \
            "${STAGING_DIR}/usr/share/pixmaps"

          go build -trimpath -mod=vendor -tags="desktop,production,webkit2_41" -ldflags="-s -w" \
            -o "${STAGING_DIR}/usr/bin/${APP_NAME}-gui" .
          go build -trimpath -mod=vendor -ldflags="-s -w" \
            -o "${STAGING_DIR}/usr/bin/${APP_NAME}" ./cmd/caracal-software-installer
          go build -trimpath -mod=vendor -ldflags="-s -w" \
            -o "${STAGING_DIR}/usr/lib/caracal-software-installer/bin/caracal-download-index" ./cmd/caracal-download-index

          cp -R scripts data "${STAGING_DIR}/usr/lib/caracal-software-installer/"
          cp -R assets "${STAGING_DIR}/usr/share/caracal-software-installer/"
          cp packaging/caracal-software-installer.desktop "${STAGING_DIR}/usr/share/applications/"
          cp build/appicon.png "${STAGING_DIR}/usr/share/pixmaps/caracal-software-installer.png"
          cp logo.txt "${STAGING_DIR}/usr/share/caracal-software-installer/"
          cp README.md LICENSE "${STAGING_DIR}/"

          tar -C dist -czf "${ARCHIVE_PATH}" "$(basename "${STAGING_DIR}")"
          sha256sum "${ARCHIVE_PATH}" > "${ARCHIVE_PATH}.sha256"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true

  update-wiki:
    name: Update wiki software list
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Regenerate Software-List.md
        run: python3 scripts/build-wiki-software-list.py wiki/Software-List.md

      - name: Commit and push wiki changes
        working-directory: wiki
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add Software-List.md
            git commit -m "Refresh Software-List for ${GITHUB_REF_NAME}"
            git push
          else
            echo "No catalog changes; wiki already up to date."
          fi
